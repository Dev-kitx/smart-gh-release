# codecov.yml — Codecov configuration for smart-gh-release
#
# Controls how Codecov reports and enforces coverage on pull requests.
#
# coverage.status.project — checks overall codebase coverage (all files)
# coverage.status.patch   — checks only the lines changed in a PR (the diff)
#
# target:    minimum coverage % required to pass the status check
# threshold: how much the coverage is allowed to drop before the check fails
#
# comment    — controls the PR comment Codecov posts after each upload
#
# Docs: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 80%       # fail if overall coverage drops below 80%
        threshold: 2%     # allow up to 2% drop (tolerance for noise)
    patch:
      default:
        target: 80%       # new lines in a PR must be at least 80% covered
        threshold: 2%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  hide_project_coverage: false  # show overall project coverage, not just the diff
  require_changes: false        # always post the comment, even if coverage didn't change
