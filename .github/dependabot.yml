version: 2

updates:
  # ── npm dependencies ─────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      actions-toolkit:
        patterns:
          - '@actions/*'
      dev-dependencies:
        dependency-type: development

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - '*'
