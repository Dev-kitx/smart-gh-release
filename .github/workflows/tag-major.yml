name: Tag Major Version

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Full release tag to point the major version at (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-major:
    name: Update floating major tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag exists
        run: |
          if ! git ls-remote --tags origin "${{ inputs.tag }}" | grep -q "${{ inputs.tag }}"; then
            echo "::error::Tag ${{ inputs.tag }} does not exist in the repository"
            exit 1
          fi

      - name: Update floating major version tag
        run: |
          TAG="${{ inputs.tag }}"
          MAJOR_NUM=$(echo "$TAG" | grep -oP '(?<=^v)\d+')
          MAJOR="v$(( MAJOR_NUM < 1 ? 1 : MAJOR_NUM ))"

          if [ -z "$MAJOR" ]; then
            echo "::error::Could not extract major version from tag: $TAG"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" "$TAG" -m "Release $TAG"
          git push origin "$MAJOR" --force

          echo "Moved $MAJOR → $TAG"
          echo "MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "TAG=$TAG"     >> "$GITHUB_ENV"

      - name: Job summary
        run: |
          PREV_MAJOR=$(git tag --list "$MAJOR.*" --sort=-version:refname | grep -v "^$TAG$" | head -1)

          {
            echo "## 🏷️ Floating Major Tag Updated"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Floating tag** | \`$MAJOR\` |"
            echo "| **Now points to** | \`$TAG\` |"
            if [ -n "$PREV_MAJOR" ]; then
              echo "| **Previously pointed to** | \`$PREV_MAJOR\` |"
            fi
            echo ""

            if [ -n "$PREV_MAJOR" ]; then
              echo "### Commits included since \`$PREV_MAJOR\`"
              echo ""
              git log "${PREV_MAJOR}..${TAG}" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H)) by @%an" | \
                sed 's/ by @github-actions\[bot\]//' | \
                sed 's/ by @dependabot\[bot\]//'
            else
              echo "### Commits included in \`$TAG\`"
              echo ""
              git log "$TAG" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H)) by @%an" | head -50
            fi
          } >> "$GITHUB_STEP_SUMMARY"
