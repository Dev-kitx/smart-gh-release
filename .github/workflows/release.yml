# ─────────────────────────────────────────────────────────────────────────────
# Alternative: fully automatic versioning from conventional commits
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'codecov.yml'
      - 'dist/**'
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write       # create releases & upload assets
  discussions: write    # create GitHub Discussions (optional)
  pull-requests: write  # required for creating pull request

jobs:
  release:

    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          
      - uses: ./
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          auto_version: true
          generate_checksums: true
          include_contributors: true

      - name: Summary
        run: |
          echo "Tag:   ${{ steps.release.outputs.tag_name }}"
          echo "Bump:  ${{ steps.release.outputs.bump_level }}"
          echo "URL:   ${{ steps.release.outputs.release_url }}"
          echo "Files: ${{ steps.release.outputs.assets_uploaded }}"
