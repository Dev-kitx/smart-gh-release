# Runs on every push to main and on pull requests targeting main.
# Skips documentation-only and auto-generated file changes to avoid
# unnecessary runs from smart-changelog PR merges or badge updates.
#
# Steps:
#   1. Run the full test suite (vitest)
#   2. Generate and upload coverage to Codecov
#   3. Build dist/index.js and verify it was produced
#   4. On main pushes, warn if dist/ is out of date with the source

name: Test, Build & Coverage

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'package.json'       # version bump from smart-changelog PR — safe to skip
      - 'codecov.yml'
      - 'dist/**'
      - '.github/badges/**'

  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'codecov.yml'
      - 'dist/**'
      - '.github/badges/**'
      # package.json intentionally absent — dependency changes in PRs must trigger CI

jobs:
  test:
    name: Test, Build & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Dev-kitx/smart-gh-release

      - name: Build dist
        run: npm run build

      - name: Verify dist/index.js was produced
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::dist/index.js not found after build"
            exit 1
          fi
          echo "dist/index.js size: $(du -sh dist/index.js | cut -f1)"

      # Warn if dist/ is stale — the pre-push hook normally prevents this,
      # but serves as a safety net for direct pushes or bypassed hooks.
      - name: Check dist is committed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet dist/; then
            echo "::warning::dist/ is out of date. Run 'npm run build' and commit the result."
          fi
