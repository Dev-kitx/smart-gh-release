name: 'Smart GitHub Release'
description: >
  Feature-rich GitHub release action: auto semantic versioning, smart grouped changelog,
  SHA-256 checksums, contributor credits, pre-release channels, required-asset validation,
  GitHub Discussions, and rich Job Summaries — all in one action.
author: 'akashbasa'

branding:
  icon: 'package'
  color: 'purple'

inputs:
  # ── Authentication ─────────────────────────────────────────────────────────
  token:
    description: 'GitHub token with repo permissions'
    required: false
    default: ${{ github.token }}

  # ── Versioning ─────────────────────────────────────────────────────────────
  tag:
    description: >
      Explicit release tag (e.g. v1.2.3). If omitted, set auto_version: true
      to have the tag computed from conventional commits.
    required: false

  version_prefix:
    description: 'Prefix prepended to auto-generated version numbers'
    required: false
    default: 'v'

  auto_version:
    description: >
      Analyse conventional commits since the last tag and automatically
      determine the next semantic version (major / minor / patch).
    required: false
    default: 'false'

  initial_version:
    description: >
      Seed version used when no prior semver tags exist (only relevant with
      auto_version: true).
    required: false
    default: '0.1.0'

  # ── Release metadata ───────────────────────────────────────────────────────
  name:
    description: 'Release title. Defaults to the tag name when omitted.'
    required: false

  body:
    description: 'Custom text prepended to the auto-generated changelog.'
    required: false

  draft:
    description: 'Publish the release as a draft.'
    required: false
    default: 'false'

  prerelease:
    description: 'Mark the release as a pre-release.'
    required: false
    default: 'false'

  prerelease_channel:
    description: >
      Pre-release channel identifier: alpha | beta | rc.
      When used with auto_version, produces versions like 1.2.0-beta.3.
    required: false

  target_commitish:
    description: >
      Commit SHA or branch name to tag. Defaults to the SHA that triggered
      the workflow.
    required: false

  # ── Changelog ──────────────────────────────────────────────────────────────
  changelog_sections:
    description: >
      JSON array to customise changelog sections. Each object must have:
      { "types": ["feat"], "label": "Features", "emoji": "✨" }
    required: false

  exclude_types:
    description: >
      Comma-separated conventional commit types to omit from the changelog.
    required: false
    default: 'chore,ci,style,test'

  # ── Contributors ───────────────────────────────────────────────────────────
  include_contributors:
    description: 'Append a Contributors section that credits everyone who committed.'
    required: false
    default: 'true'

  # ── Assets ─────────────────────────────────────────────────────────────────
  files:
    description: >
      Newline-separated file paths or glob patterns to upload as release
      assets. Example:
        dist/*.zip
        dist/*.tar.gz
    required: false

  generate_checksums:
    description: >
      Auto-generate a SHA-256 checksums file and upload it alongside other
      assets. The file lists every asset's hash in the standard
      "<hash>  <filename>" format.
    required: false
    default: 'true'

  checksum_file:
    description: 'Name of the generated checksum file.'
    required: false
    default: 'checksums.txt'

  fail_on_unmatched_files:
    description: 'Fail the action if any glob pattern in `files` matches no files.'
    required: false
    default: 'false'

  required_assets:
    description: >
      Newline-separated glob patterns that MUST match at least one resolved
      file. The release is aborted when any pattern goes unmatched — useful
      for ensuring all platform binaries are present before publishing.
    required: false

  # ── Behaviour ──────────────────────────────────────────────────────────────
  update_existing:
    description: >
      When a release for the given tag already exists, update it instead of
      failing. Existing assets are preserved; new assets are appended.
    required: false
    default: 'false'

  # ── GitHub Discussions ─────────────────────────────────────────────────────
  create_discussion:
    description: >
      Create a GitHub Discussion announcing this release. Requires the
      `discussions: write` permission and an existing category.
    required: false
    default: 'false'

  discussion_category:
    description: 'Name of the repository Discussion category to post into.'
    required: false
    default: 'Announcements'

outputs:
  release_id:
    description: 'Numeric ID of the created / updated release.'
  release_url:
    description: 'HTML URL of the release page.'
  upload_url:
    description: 'Asset upload URL (useful for subsequent upload steps).'
  tag_name:
    description: 'The resolved tag name (e.g. v1.3.0).'
  version:
    description: 'Version string without prefix (e.g. 1.3.0).'
  assets_uploaded:
    description: 'Number of assets successfully uploaded.'
  changelog:
    description: 'The full generated changelog in Markdown.'
  bump_level:
    description: 'Detected version bump: major | minor | patch.'

runs:
  using: 'node24'
  main: 'dist/index.js'
